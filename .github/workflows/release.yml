name: Build Windows installer

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write # allows creating a Release on tag

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Only create a GitHub Release when triggered by a version tag.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('UQ Timetable Planner {0}', github.ref_name) || '' }}
          releaseDraft: false
          prerelease: false

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
