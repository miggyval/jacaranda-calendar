name: Build installers

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write # allows creating a Release on tag

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows-installers
            args: ""
            paths: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest # Apple Silicon (arm64, native)
            artifact: macos-dmg-apple-silicon
            args: ""
            paths: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - os: macos-latest # Intel (x86_64, cross-compiled on the arm64 runner)
            artifact: macos-dmg-intel
            rust-target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
            paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - os: ubuntu-22.04 # Linux x86_64 (amd64)
            artifact: linux-amd64
            args: ""
            paths: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/rpm/*.rpm
          - os: ubuntu-24.04-arm # Linux aarch64
            artifact: linux-arm64
            args: ""
            paths: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/rpm/*.rpm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf build-essential curl wget file libxdo-dev libssl-dev

      - run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          # Only create a GitHub Release when triggered by a version tag.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('UQ Timetable Planner {0}', github.ref_name) || '' }}
          releaseDraft: false
          prerelease: true # alpha builds
          releaseBody: |
            Alpha build — thanks for testing! These installers are **unsigned**, so your OS will warn you on first launch; that's expected.

            **Windows** — download `..._x64-setup.exe` (or the `.msi`). If SmartScreen appears: **More info → Run anyway**.

            **macOS** — Apple Silicon (M1/M2/M3…): the `aarch64` `.dmg`. Intel: the `x64` `.dmg`. Drag to Applications, then on first launch **right-click the app → Open → Open** (or run `xattr -cr "/Applications/UQ Timetable Planner.app"`).

            **Linux** — pick your arch (`amd64` for Intel/AMD, `aarch64` for ARM): `.AppImage` (`chmod +x` then run), `.deb` (Debian/Ubuntu), or `.rpm` (Fedora/openSUSE).

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: ${{ matrix.paths }}
