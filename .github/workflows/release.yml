name: Build installers

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write # allows creating a Release on tag

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows-installers
            paths: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest # Apple Silicon (arm64)
            artifact: macos-dmg-apple-silicon
            paths: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - os: macos-13 # Intel (x86_64)
            artifact: macos-dmg-intel
            paths: |
              src-tauri/target/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Only create a GitHub Release when triggered by a version tag.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('UQ Timetable Planner {0}', github.ref_name) || '' }}
          releaseDraft: false
          prerelease: true # alpha builds
          releaseBody: |
            Alpha build — thanks for testing! These installers are **unsigned**, so your OS will warn you on first launch; that's expected.

            **Windows** — download `..._x64-setup.exe` (or the `.msi`). If SmartScreen appears: **More info → Run anyway**.

            **macOS** — Apple Silicon (M1/M2/M3…): the `aarch64` `.dmg`. Intel: the `x64` `.dmg`. Drag to Applications, then on first launch **right-click the app → Open → Open** (or run `xattr -cr "/Applications/UQ Timetable Planner.app"`).

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: ${{ matrix.paths }}
