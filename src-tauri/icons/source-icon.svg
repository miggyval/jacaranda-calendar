<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6a36a3"/>
      <stop offset="1" stop-color="#321150"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.22" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3ad3ec"/><stop offset="1" stop-color="#1fa6c4"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc857"/><stop offset="1" stop-color="#f0a020"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#54d67e"/><stop offset="1" stop-color="#2fae5a"/>
    </linearGradient>
  </defs>

  <!-- app-icon squircle -->
  <rect x="48" y="48" width="928" height="928" rx="216" fill="url(#bg)"/>
  <rect x="48" y="48" width="928" height="928" rx="216" fill="url(#glow)"/>

  <!-- day-header pills -->
  <g fill="#ffffff" fill-opacity="0.18">
    <rect x="208" y="250" width="144" height="30" rx="15"/>
    <rect x="440" y="250" width="144" height="30" rx="15"/>
    <rect x="672" y="250" width="144" height="30" rx="15"/>
  </g>

  <!-- faint column lanes -->
  <g fill="#ffffff" fill-opacity="0.05">
    <rect x="184" y="312" width="192" height="470" rx="22"/>
    <rect x="416" y="312" width="192" height="470" rx="22"/>
    <rect x="648" y="312" width="192" height="470" rx="22"/>
  </g>

  <!-- faint time gridlines -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="3">
    <line x1="184" y1="400" x2="840" y2="400"/>
    <line x1="184" y1="500" x2="840" y2="500"/>
    <line x1="184" y1="600" x2="840" y2="600"/>
    <line x1="184" y1="700" x2="840" y2="700"/>
  </g>

  <!-- class blocks, staggered like a week timetable -->
  <rect x="200" y="372" width="160" height="232" rx="20" fill="url(#cyan)"/>
  <rect x="432" y="300" width="160" height="176" rx="20" fill="url(#amber)"/>
  <rect x="664" y="452" width="160" height="276" rx="20" fill="url(#green)"/>
</svg>
